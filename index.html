<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 핸드벨 교실</title>
    <!-- Tailwind CSS 스타일 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #f8f9fa; }
        .hidden { display: none !important; }
        .btn-large { padding: 20px; font-size: 1.5rem; font-weight: bold; border-radius: 15px; width: 100%; margin-bottom: 15px; color: white; cursor: pointer; border: none; }
    </style>
</head>
<body>

    <!-- 입장 로비 -->
    <div id="entry-screen" class="fixed inset-0 flex flex-col items-center justify-center p-4 bg-gradient-to-br from-blue-50 to-indigo-100 z-50">
        <div class="bg-white p-8 rounded-3xl shadow-xl border-4 border-blue-400 w-full max-w-sm text-center">
            <h1 class="text-4xl font-bold mb-8 text-blue-600">🎵 스마트 핸드벨</h1>
            
            <button class="btn-large bg-red-500 hover:bg-red-600" onclick="window.enterAsTeacher()">👨‍🏫 선생님으로 입장하기</button>
            <button class="btn-large bg-blue-500 hover:bg-blue-600" onclick="window.showStudentForm()">🧑‍🎓 학생으로 입장하기</button>
            <button class="btn-large bg-green-500 hover:bg-green-600" onclick="window.enterAsFreeUser()">🎵 자유 이용자로 입장하기</button>
        </div>

        <!-- 학생 입장 폼 (기존과 동일) -->
        <div id="entry-student-form" class="hidden bg-white p-6 rounded-3xl shadow-xl border-4 border-blue-400 w-full max-w-sm mt-4">
            <h2 class="text-2xl font-bold mb-4 text-blue-600">🧑‍🎓 학생 입장</h2>
            <select id="entry-slot-select" class="w-full p-3 border-2 border-blue-300 rounded-xl mb-4 text-lg font-bold"></select>
            <input type="text" id="entry-name" placeholder="이름 입력" class="w-full p-3 border-2 border-orange-300 rounded-xl mb-4 text-lg">
            <div class="flex gap-2">
                <button class="flex-1 p-4 bg-blue-500 text-white font-bold rounded-xl" onclick="window.joinAsStudent()">입장하기</button>
                <button class="flex-1 p-4 bg-gray-400 text-white font-bold rounded-xl" onclick="window.backToEntrySelection()">취소</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBLs7v08fBQ8a1lv0-PWk_kWBnxy1xG6F8",
            authDomain: "handbell-class.firebaseapp.com",
            databaseURL: "https://handbell-class-default-rtdb.firebaseio.com",
            projectId: "handbell-class",
            storageBucket: "handbell-class.firebasestorage.app",
            messagingSenderId: "923483706226",
            appId: "1:923483706226:web:2d150a12c2c0307595c3eb"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // 전역 함수로 노출
        window.db = db;
        window.dbRef = ref;
        window.dbSet = set;
        window.dbUpdate = update;

        // 입장 관련 전역 함수들
        window.enterAsTeacher = function() {
            // 선생님 입장 로직 (기존 로직 그대로)
            document.getElementById('entry-screen').style.display = 'none';
            // ... (실제 앱 구동 코드)
            alert("선생님으로 입장합니다.");
        };

        window.showStudentForm = function() {
            document.getElementById('entry-selection').classList.add('hidden');
            document.getElementById('entry-student-form').classList.remove('hidden');
        };

        window.backToEntrySelection = function() {
            document.getElementById('entry-selection').classList.remove('hidden');
            document.getElementById('entry-student-form').classList.add('hidden');
        };

        window.enterAsFreeUser = function() {
            // 자유 이용자 입장 로직
            document.getElementById('entry-screen').style.display = 'none';
            alert("자유 이용자로 입장합니다.");
        };

        window.joinAsStudent = function() {
            alert("입장 요청을 보냈습니다!");
        };
    </script>
</body>
</html>
```

### ⚠️ 무엇이 문제였나요?
`window.enterAsTeacher`와 같은 함수들이 `module` 스크립트 안에 갇혀 있어서, HTML 버튼이 그 함수를 찾지 못했던 것이었습니다. **함수 앞에 `window.`를 붙여줌으로써 전역에서 버튼이 클릭될 때 함수를 찾아올 수 있게 했습니다.**

이제 버튼을 누르면 정상적으로 반응할 것입니다! 복사해서 반영해 주세요.
