<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 핸드벨 교실</title>
    <style>
        :root { --bg-color: #f8f9fa; --primary-color: #4a90e2; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg-color); margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        #entry-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .entry-box { background: white; padding: 40px; border-radius: 20px; border: 2px solid #ddd; text-align: center; width: 90%; max-width: 400px; }
        .btn-large { padding: 15px; font-size: 1.2rem; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; width: 100%; margin-bottom: 10px; color: white; }
        .control-panel { background: white; padding: 20px; border-radius: 15px; width: 95%; max-width: 1000px; margin-top: 10px; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        .bell-container { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .bell { width: 70px; height: 100px; border-radius: 20px 20px 5px 5px; display: flex; align-items: flex-end; justify-content: center; font-weight: bold; padding-bottom: 10px; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <!-- 입장 로비 -->
    <div id="entry-screen">
        <div class="entry-box">
            <h1>🎵 스마트 핸드벨</h1>
            <button class="btn-large" style="background: #e74c3c;" onclick="window.enterAsTeacher()">👨‍🏫 선생님으로 입장</button>
            <button class="btn-large" style="background: #3498db;" onclick="window.showStudentForm()">🧑‍🎓 학생(합주) 입장</button>
            <button class="btn-large" style="background: #2ecc71;" onclick="window.enterAsFreeUser()">🎵 자유 이용자로 입장</button>
        </div>
        <!-- 학생 입장 폼은 나중에 동적으로 나타남 -->
    </div>

    <!-- 메인 앱 영역 -->
    <div id="main-app" class="hidden" style="width: 100%; height: 100%;">
        <div class="tabs">
            <button class="tab-btn" onclick="window.setMode('dashboard')" id="tab-dashboard">👨‍👩‍👧‍👦 접속 관리</button>
            <button class="tab-btn" onclick="window.setMode('free')">자유 연주</button>
            <button class="tab-btn" onclick="window.setMode('multi')">📡 실시간 합주</button>
        </div>
        <div id="panel-dashboard" class="control-panel">접속 관리 보드...</div>
        <div id="panel-free" class="control-panel hidden">자유 연주 모드...</div>
        <div id="panel-multi" class="control-panel hidden">실시간 합주 모드...</div>
        <div class="bell-container" id="bells"></div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBLs7v08fBQ8a1lv0-PWk_kWBnxy1xG6F8",
            authDomain: "handbell-class.firebaseapp.com",
            databaseURL: "https://handbell-class-default-rtdb.firebaseio.com",
            projectId: "handbell-class",
            storageBucket: "handbell-class.firebasestorage.app",
            messagingSenderId: "923483706226",
            appId: "1:923483706226:web:2d150a12c2c0307595c3eb"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // 전역 함수 등록
        window.enterAsTeacher = async () => {
            const teacherRef = ref(db, 'classSession/teacherActive');
            const snap = await get(teacherRef);
            if (snap.val() === true) { alert("이미 교사가 접속 중입니다."); return; }
            await set(teacherRef, true);
            onDisconnect(teacherRef).set(false);
            window.myRole = 0;
            document.getElementById('entry-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            window.setMode('dashboard');
        };

        window.enterAsFreeUser = () => {
            window.myRole = -1; // 일반 이용자
            document.getElementById('entry-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            window.setMode('free');
        };

        window.showStudentForm = () => {
            alert("학생 입장 폼 연결 중...");
        };

        window.setMode = (mode) => {
            document.querySelectorAll('.control-panel').forEach(p => p.classList.add('hidden'));
            document.getElementById('panel-' + mode).classList.remove('hidden');
        };

        // 초기 핸드벨 생성
        const notes = ['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4', 'C5'];
        const container = document.getElementById('bells');
        notes.forEach(note => {
            const b = document.createElement('div');
            b.className = 'bell ' + note.toLowerCase();
            b.style.backgroundColor = '#4a90e2';
            b.innerText = note;
            container.appendChild(b);
        });
    </script>
</body>
</html>
