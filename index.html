<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>스마트 핸드벨 교실</title>
 
<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- 친근한 한글 글꼴 (실패 시 시스템 글꼴로 대체) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<!-- Firebase (compat: 인앱 브라우저 호환용 클래식 스크립트) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
 
<style>
  :root { --bg:#fef9f3; }
  html,body{ height:100%; }
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg);
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;
  }
  *{ touch-action:manipulation; }
  .hidden{ display:none !important; }
  .screen{ min-height:100vh; min-height:100dvh; }
 
  /* 종소리 칠 때 통통 튀는 효과 */
  @keyframes pop { 0%{transform:scale(1)} 35%{transform:scale(1.1)} 100%{transform:scale(1)} }
  .pop{ animation:pop .26s ease; }
 
  /* 내 차례일 때 초록빛이 번지는 효과 */
  @keyframes glow {
    0%,100%{ box-shadow:0 0 0 0 rgba(34,197,94,.65); }
    50%{ box-shadow:0 0 0 14px rgba(34,197,94,0); }
  }
  .turn{ outline:6px solid #16a34a; outline-offset:-3px; animation:glow 1.1s infinite; }
 
  .bell{
    position:relative; border:none; border-radius:24px; color:#fff;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    box-shadow:0 8px 0 rgba(0,0,0,.18), 0 12px 22px rgba(0,0,0,.18);
    cursor:pointer; user-select:none; transition:transform .05s;
    line-height:1;
  }
  .bell:active{ transform:translateY(4px); box-shadow:0 4px 0 rgba(0,0,0,.18); }
  .bell .emoji{ font-size:1.6rem; margin-bottom:4px; filter:drop-shadow(0 2px 2px rgba(0,0,0,.2)); }
  .bell .nm{ font-weight:800; text-shadow:0 2px 3px rgba(0,0,0,.25); }
  .bell .who{
    margin-top:6px; font-size:.78rem; font-weight:700; background:rgba(255,255,255,.28);
    padding:2px 8px; border-radius:999px; max-width:90%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .bell.taken-off{ opacity:.32; filter:grayscale(.5); cursor:not-allowed; }
 
  /* 성공 축하 오버레이 */
  #celebrate{ background:rgba(0,0,0,.45); backdrop-filter:blur(2px); }
  @keyframes rise { from{transform:translateY(20px) scale(.8); opacity:0} to{transform:translateY(0) scale(1); opacity:1} }
  #celebrate .card{ animation:rise .4s ease; }
</style>
</head>
<body class="text-slate-800">
 
<!-- ===================== 입장 화면 ===================== -->
<div id="entry-screen" class="screen fixed inset-0 flex flex-col items-center justify-center p-5 bg-gradient-to-br from-amber-50 via-rose-50 to-sky-100 z-40 overflow-auto">
 
  <div id="entry-selection" class="bg-white p-7 rounded-[28px] shadow-2xl w-full max-w-sm text-center">
    <div class="text-6xl mb-2">🔔</div>
    <h1 class="text-3xl font-extrabold mb-1 text-rose-500">스마트 핸드벨</h1>
    <p class="text-slate-400 font-bold mb-7">함께 울려요, 우리 반 음악 시간</p>
 
    <button onclick="App.enterTeacher()" class="w-full py-5 mb-3 rounded-2xl text-white text-xl font-extrabold bg-rose-500 active:translate-y-1 shadow-lg shadow-rose-200">👩‍🏫 선생님으로 입장</button>
    <button onclick="App.showStudentForm()" class="w-full py-5 mb-3 rounded-2xl text-white text-xl font-extrabold bg-sky-500 active:translate-y-1 shadow-lg shadow-sky-200">🧒 학생으로 입장</button>
    <button onclick="App.enterFree()" class="w-full py-5 rounded-2xl text-white text-xl font-extrabold bg-emerald-500 active:translate-y-1 shadow-lg shadow-emerald-200">🎵 자유롭게 연주하기</button>
  </div>
 
  <!-- 학생 입장 폼 -->
  <div id="entry-student-form" class="hidden bg-white p-7 rounded-[28px] shadow-2xl w-full max-w-sm text-center">
    <h2 class="text-2xl font-extrabold mb-5 text-sky-500">🧒 학생 입장</h2>
 
    <label class="block text-left text-sm font-bold text-slate-400 mb-1">방 번호</label>
    <input id="entry-code" inputmode="numeric" maxlength="4" placeholder="0000"
      class="w-full p-4 border-2 border-sky-200 rounded-2xl mb-4 text-2xl font-extrabold text-center tracking-[0.3em]">
 
    <label class="block text-left text-sm font-bold text-slate-400 mb-1">이름</label>
    <input id="entry-name" placeholder="이름을 적어요"
      class="w-full p-4 border-2 border-amber-200 rounded-2xl mb-2 text-lg font-bold text-center">
 
    <p id="entry-error" class="hidden text-rose-500 font-bold text-sm my-2"></p>
 
    <!-- 음(벨) 고르기: 방 확인 후 나타남 -->
    <div id="entry-note-pick" class="hidden mt-4">
      <p class="text-slate-500 font-bold mb-3">연주할 종을 골라요</p>
      <div id="entry-bells" class="grid grid-cols-4 gap-2"></div>
    </div>
 
    <div class="flex gap-2 mt-5">
      <button id="entry-confirm" onclick="App.checkRoom()" class="flex-1 py-4 bg-sky-500 text-white text-lg font-extrabold rounded-2xl active:translate-y-1">방 확인</button>
      <button onclick="App.backToSelection()" class="flex-1 py-4 bg-slate-300 text-white text-lg font-extrabold rounded-2xl active:translate-y-1">뒤로</button>
    </div>
  </div>
 
  <p id="entry-status" class="text-slate-400 text-sm font-bold mt-5"></p>
</div>
 
<!-- ===================== 선생님 화면 ===================== -->
<div id="teacher-screen" class="hidden screen max-w-2xl mx-auto p-4 pb-10">
  <div class="flex items-center justify-between bg-white rounded-2xl shadow p-3 mb-4">
    <div>
      <p class="text-xs font-bold text-slate-400 leading-none mb-1">방 번호 · 학생에게 알려주세요</p>
      <p id="t-code" class="text-4xl font-extrabold text-rose-500 tracking-widest leading-none">----</p>
    </div>
    <div class="text-right">
      <p class="text-xs font-bold text-slate-400">입장한 학생</p>
      <p id="t-count" class="text-2xl font-extrabold text-sky-500">0명</p>
    </div>
    <button onclick="App.exit()" class="ml-2 px-3 py-2 bg-slate-200 rounded-xl font-bold text-slate-500 text-sm">나가기</button>
  </div>
 
  <!-- 노래 고르기 -->
  <div class="bg-white rounded-2xl shadow p-4 mb-4">
    <p class="font-extrabold text-slate-500 mb-2">🎼 노래 고르기</p>
    <div id="t-songs" class="grid grid-cols-2 gap-2 mb-4"></div>
 
    <p class="font-extrabold text-slate-500 mb-2">연주 방법</p>
    <div class="grid grid-cols-2 gap-2 mb-3">
      <button data-mode="demo" onclick="App.setMode('demo')" class="t-mode py-3 rounded-xl font-extrabold border-2">▶️ 시범 모드<br><span class="text-xs font-bold opacity-70">자동으로 들려줘요</span></button>
      <button data-mode="ensemble" onclick="App.setMode('ensemble')" class="t-mode py-3 rounded-xl font-extrabold border-2">🤝 합주 모드<br><span class="text-xs font-bold opacity-70">차례대로 직접 울려요</span></button>
    </div>
 
    <div id="t-tempo" class="mb-3">
      <p class="font-extrabold text-slate-500 mb-2">빠르기</p>
      <div class="grid grid-cols-3 gap-2">
        <button data-tempo="900" onclick="App.setTempo(900)" class="t-tempo py-3 rounded-xl font-extrabold border-2">🐢 느리게</button>
        <button data-tempo="650" onclick="App.setTempo(650)" class="t-tempo py-3 rounded-xl font-extrabold border-2">🙂 보통</button>
        <button data-tempo="450" onclick="App.setTempo(450)" class="t-tempo py-3 rounded-xl font-extrabold border-2">🐇 빠르게</button>
      </div>
    </div>
 
    <div class="flex gap-2">
      <button id="t-start" onclick="App.startSong()" class="flex-1 py-4 bg-emerald-500 text-white text-lg font-extrabold rounded-2xl active:translate-y-1">노래 시작</button>
      <button id="t-stop" onclick="App.stopSong()" class="flex-1 py-4 bg-rose-400 text-white text-lg font-extrabold rounded-2xl active:translate-y-1">멈추기</button>
    </div>
  </div>
 
  <!-- 지금 연주 -->
  <div id="t-now" class="hidden bg-gradient-to-r from-sky-500 to-indigo-500 text-white rounded-2xl shadow p-4 mb-4 text-center">
    <p id="t-now-title" class="font-extrabold text-lg opacity-90"></p>
    <p id="t-now-note" class="text-5xl font-extrabold my-1">·</p>
    <p id="t-now-progress" class="font-bold opacity-90"></p>
    <p id="t-now-hint" class="text-sm font-bold opacity-80 mt-1"></p>
  </div>
 
  <!-- 종 모음 -->
  <div class="bg-white rounded-2xl shadow p-4">
    <div class="flex items-center justify-between mb-3">
      <p class="font-extrabold text-slate-500">🔔 우리 반 종</p>
      <button onclick="App.resetRoom()" class="text-xs font-bold text-rose-400 underline">학생 모두 내보내기</button>
    </div>
    <div id="t-bells" class="grid grid-cols-4 gap-3"></div>
  </div>
</div>
 
<!-- ===================== 학생 화면 ===================== -->
<div id="student-screen" class="hidden screen max-w-md mx-auto p-4 flex flex-col" style="min-height:100dvh;">
  <div class="flex items-center justify-between bg-white rounded-2xl shadow p-3 mb-3">
    <div>
      <p id="s-name" class="text-xl font-extrabold text-slate-700 leading-none">이름</p>
      <p class="text-xs font-bold text-slate-400 mt-1">방 <span id="s-code">----</span></p>
    </div>
    <button onclick="App.exit()" class="px-3 py-2 bg-slate-200 rounded-xl font-bold text-slate-500 text-sm">나가기</button>
  </div>
 
  <div id="s-banner" class="rounded-2xl p-3 mb-3 text-center font-extrabold text-lg bg-slate-100 text-slate-400">노래를 기다려요</div>
 
  <div class="flex-1 flex items-center justify-center">
    <div id="s-bell-wrap" class="w-full"></div>
  </div>
 
  <p id="s-progress" class="text-center font-bold text-slate-400 mt-3 mb-2"></p>
</div>
 
<!-- ===================== 자유 이용자 화면 ===================== -->
<div id="free-screen" class="hidden screen max-w-2xl mx-auto p-4 pb-10">
  <div class="flex items-center justify-between bg-white rounded-2xl shadow p-3 mb-4">
    <p class="text-xl font-extrabold text-emerald-500">🎵 자유 연주</p>
    <button onclick="App.exit()" class="px-3 py-2 bg-slate-200 rounded-xl font-bold text-slate-500 text-sm">나가기</button>
  </div>
 
  <div class="bg-white rounded-2xl shadow p-4 mb-4">
    <p class="font-extrabold text-slate-500 mb-3">🔔 종을 눌러 소리를 내요</p>
    <div id="f-bells" class="grid grid-cols-4 gap-3"></div>
  </div>
 
  <div class="bg-white rounded-2xl shadow p-4">
    <p class="font-extrabold text-slate-500 mb-3">🎼 노래 혼자 듣기</p>
    <div id="f-songs" class="grid grid-cols-2 gap-2 mb-3"></div>
    <button id="f-stop" onclick="App.stopFreeSong()" class="hidden w-full py-3 bg-rose-400 text-white font-extrabold rounded-2xl">멈추기</button>
  </div>
</div>
 
<!-- 성공 축하 -->
<div id="celebrate" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6">
  <div class="card bg-white rounded-[28px] shadow-2xl px-8 py-10 text-center">
    <div class="text-6xl mb-3">🎉</div>
    <p class="text-3xl font-extrabold text-rose-500 mb-1">잘했어요!</p>
    <p class="text-slate-400 font-bold">노래를 끝까지 연주했어요</p>
  </div>
</div>
 
<script>
"use strict";
(function () {
 
  /* ---------- 음 정보 (한 옥타브: 도~높은도) ---------- */
  var NOTES = [
    { name:"도",   freq:261.63, color:"#ef4444" },
    { name:"레",   freq:293.66, color:"#f97316" },
    { name:"미",   freq:329.63, color:"#eab308" },
    { name:"파",   freq:349.23, color:"#22c55e" },
    { name:"솔",   freq:392.00, color:"#06b6d4" },
    { name:"라",   freq:440.00, color:"#3b82f6" },
    { name:"시",   freq:493.88, color:"#8b5cf6" },
    { name:"높은도", freq:523.25, color:"#ec4899" }
  ];
 
  /* ---------- 노래 (숫자는 음 번호 0=도 ... 7=높은도) ---------- */
  var SONGS = {
    school:    { title:"학교종",        seq:[4,4,5,5,4,4,2, 4,4,2,2,1, 4,4,5,5,4,4,2, 4,2,1,2,0] },
    airplane:  { title:"비행기",        seq:[2,1,0,1,2,2,2, 1,1,1, 2,4,4, 2,1,0,1,2,2,2, 2,1,1,2,1,0] },
    star:      { title:"반짝반짝 작은별", seq:[0,0,4,4,5,5,4, 3,3,2,2,1,1,0, 4,4,3,3,2,2,1, 0,0,4,4,5,5,4, 3,3,2,2,1,1,0] },
    butterfly: { title:"나비야",        seq:[4,2,2, 3,1,1, 0,1,2,3,4,4,4, 4,2,2, 3,1,1, 0,2,4,4,2,2,2] }
  };
  var SONG_KEYS = ["school","airplane","star","butterfly"];
 
  /* ---------- 소리 합성 (종소리) ---------- */
  var audioCtx = null;
  function initAudio() {
    if (!audioCtx) {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    }
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  }
  function playBell(freq) {
    initAudio();
    if (!audioCtx) return;
    var now = audioCtx.currentTime;
    var master = audioCtx.createGain();
    master.gain.value = 0.5;
    master.connect(audioCtx.destination);
    // 종 특유의 여러 배음
    var partials = [
      { r:1.0,  g:1.0,  d:1.8 },
      { r:2.0,  g:0.5,  d:1.4 },
      { r:3.0,  g:0.25, d:1.0 },
      { r:4.2,  g:0.12, d:0.7 },
      { r:5.4,  g:0.08, d:0.5 }
    ];
    partials.forEach(function (p) {
      var osc = audioCtx.createOscillator();
      osc.type = "sine";
      osc.frequency.value = freq * p.r;
      var g = audioCtx.createGain();
      g.gain.setValueAtTime(0.0001, now);
      g.gain.linearRampToValueAtTime(p.g, now + 0.006);
      g.gain.exponentialRampToValueAtTime(0.0001, now + p.d);
      osc.connect(g); g.connect(master);
      osc.start(now); osc.stop(now + p.d + 0.1);
    });
  }
  function playChord() { // 축하 아르페지오
    [0,2,4,7].forEach(function (i, k) {
      setTimeout(function () { playBell(NOTES[i].freq); }, k * 140);
    });
  }
 
  /* ---------- Firebase ---------- */
  var firebaseConfig = {
    apiKey: "AIzaSyBLs7v08fBQ8a1lv0-PWk_kWBnxy1xG6F8",
    authDomain: "handbell-class.firebaseapp.com",
    databaseURL: "https://handbell-class-default-rtdb.firebaseio.com",
    projectId: "handbell-class",
    storageBucket: "handbell-class.firebasestorage.app",
    messagingSenderId: "923483706226",
    appId: "1:923483706226:web:2d150a12c2c0307595c3eb"
  };
  var db = null, dbReady = false;
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    dbReady = true;
  } catch (e) {
    console.warn("Firebase 연결 실패 — 자유 연주만 가능합니다.", e);
  }
 
  /* ---------- 상태 ---------- */
  var role = null;            // teacher | student | free
  var roomCode = null;
  var myDeviceId = "d" + Math.random().toString(36).slice(2, 9);
  var myJoinTime = Date.now();
  var mySlot = null;          // 학생 본인 음 번호
  var selectedSong = "school";
  var mode = "demo";          // demo | ensemble
  var tempoMs = 650;
  var demoTimer = null;
  var freeTimer = null;
 
  // 합주 모드용 (선생님 기기 기준)
  var ensembleActive = false, ensembleSong = "school", ensembleStep = 0;
  // 모든 기기 공유 노래 상태 (리스너로 갱신)
  var songState = { active:false };
 
  /* ---------- 입력 헬퍼 ---------- */
  var TAP = window.PointerEvent ? "pointerdown" : "click";
  function bindTap(el, handler) {
    el.addEventListener(TAP, function (e) { if (e.preventDefault) e.preventDefault(); handler(e); });
  }
  function $(id) { return document.getElementById(id); }
  function show(id) { $(id).classList.remove("hidden"); }
  function hide(id) { $(id).classList.add("hidden"); }
 
  function showScreen(id) {
    ["entry-screen","teacher-screen","student-screen","free-screen"].forEach(function (s) { hide(s); });
    show(id);
  }
 
  /* ---------- 종 버튼 만들기 ---------- */
  function makeBell(idx, opts) {
    opts = opts || {};
    var n = NOTES[idx];
    var el = document.createElement("button");
    el.className = "bell";
    el.style.background = n.color;
    el.style.minHeight = (opts.height || 92) + "px";
    el.setAttribute("data-idx", idx);
    var nameSize = n.name.length > 1 ? "1.4rem" : "2.1rem";
    el.innerHTML =
      '<span class="emoji">🔔</span>' +
      '<span class="nm" style="font-size:' + nameSize + '">' + n.name + '</span>' +
      (opts.who !== undefined ? '<span class="who">' + opts.who + '</span>' : '');
    if (opts.onTap) bindTap(el, function () { opts.onTap(idx); });
    return el;
  }
  function popBell(container, idx) {
    if (!container) return;
    var el = container.querySelector('[data-idx="' + idx + '"]');
    if (!el) return;
    el.classList.remove("pop"); void el.offsetWidth; el.classList.add("pop");
  }
 
  /* ---------- 종 울리기 (소리 + 표시 + 공유) ---------- */
  function ringLocal(idx) {
    playBell(NOTES[idx].freq);
    if (role === "teacher") popBell($("t-bells"), idx);
    else if (role === "free") popBell($("f-bells"), idx);
    else if (role === "student") popBell($("s-bell-wrap"), idx);
  }
  function broadcastRing(idx) {
    if (!dbReady || !roomCode) return;
    try {
      db.ref("rooms/" + roomCode + "/ring").push({ deviceId: myDeviceId, idx: idx, ts: Date.now() });
    } catch (e) {}
  }
 
  /* ================= 입장 흐름 ================= */
  function enterTeacher() {
    initAudio();
    role = "teacher";
    roomCode = ("" + Math.floor(1000 + Math.random() * 9000));
    myJoinTime = Date.now();
    showScreen("teacher-screen");
    setupTeacher();
  }
  function showStudentForm() {
    initAudio();
    hide("entry-selection"); show("entry-student-form");
  }
  function backToSelection() {
    show("entry-selection"); hide("entry-student-form");
    hide("entry-note-pick"); hide("entry-error");
    $("entry-confirm").textContent = "방 확인";
    $("entry-confirm").setAttribute("onclick", "App.checkRoom()");
  }
  function enterFree() {
    initAudio();
    role = "free";
    showScreen("free-screen");
    setupFree();
  }
 
  /* ================= 선생님 ================= */
  function setupTeacher() {
    $("t-code").textContent = roomCode;
 
    // 노래 버튼
    var sc = $("t-songs"); sc.innerHTML = "";
    SONG_KEYS.forEach(function (key) {
      var b = document.createElement("button");
      b.className = "t-song py-3 rounded-xl font-extrabold border-2 border-slate-200 text-slate-600";
      b.textContent = SONGS[key].title;
      b.setAttribute("data-song", key);
      b.onclick = function () { selectSong(key); };
      sc.appendChild(b);
    });
    selectSong("school");
    setMode("demo");
    setTempo(650);
 
    // 종 모음
    renderTeacherBells({});
 
    if (!dbReady) { $("t-code").textContent = "오프라인"; return; }
 
    // 방 생성
    db.ref("rooms/" + roomCode).set({
      createdAt: Date.now(),
      song: { active: false }
    });
    db.ref("rooms/" + roomCode).onDisconnect().remove();
 
    // 학생 명단
    db.ref("rooms/" + roomCode + "/slots").on("value", function (snap) {
      renderTeacherBells(snap.val() || {});
    });
    // 종 친 기록
    db.ref("rooms/" + roomCode + "/ring").on("child_added", function (snap) {
      var v = snap.val(); if (!v || v.ts < myJoinTime) return;
      popBell($("t-bells"), v.idx);
      if (v.deviceId !== myDeviceId) playBell(NOTES[v.idx].freq); // 학생 종소리를 교실 스피커로
      // 합주 진행
      if (ensembleActive) {
        var seq = SONGS[ensembleSong].seq;
        if (v.idx === seq[ensembleStep]) {
          ensembleStep++;
          if (ensembleStep >= seq.length) finishSong();
          else db.ref("rooms/" + roomCode + "/song").update({ currentStep: ensembleStep });
        }
      }
    });
    // 노래 상태(본인 화면 갱신용)
    db.ref("rooms/" + roomCode + "/song").on("value", function (snap) {
      songState = snap.val() || { active: false };
      updateNowPlaying();
    });
  }
 
  function renderTeacherBells(slots) {
    var count = 0;
    var c = $("t-bells"); c.innerHTML = "";
    for (var i = 0; i < 8; i++) {
      var taken = slots && slots[i];
      if (taken) count++;
      var who = taken ? slots[i].name : "비어 있음";
      var bell = makeBell(i, { who: who, height: 96, onTap: onTeacherBell });
      c.appendChild(bell);
    }
    $("t-count").textContent = count + "명";
    applyTurnHighlight();
  }
  function onTeacherBell(idx) {
    ringLocal(idx);
    broadcastRing(idx);
  }
 
  function selectSong(key) {
    selectedSong = key;
    document.querySelectorAll(".t-song").forEach(function (b) {
      var on = b.getAttribute("data-song") === key;
      b.classList.toggle("bg-sky-500", on);
      b.classList.toggle("text-white", on);
      b.classList.toggle("border-sky-500", on);
      b.classList.toggle("text-slate-600", !on);
      b.classList.toggle("border-slate-200", !on);
    });
  }
  function setMode(m) {
    mode = m;
    document.querySelectorAll(".t-mode").forEach(function (b) {
      var on = b.getAttribute("data-mode") === m;
      b.classList.toggle("bg-indigo-500", on);
      b.classList.toggle("text-white", on);
      b.classList.toggle("border-indigo-500", on);
      b.classList.toggle("border-slate-200", !on);
      b.classList.toggle("text-slate-600", !on);
    });
    $("t-tempo").style.display = (m === "demo") ? "block" : "none";
  }
  function setTempo(ms) {
    tempoMs = ms;
    document.querySelectorAll(".t-tempo").forEach(function (b) {
      var on = parseInt(b.getAttribute("data-tempo"), 10) === ms;
      b.classList.toggle("bg-amber-400", on);
      b.classList.toggle("text-white", on);
      b.classList.toggle("border-amber-400", on);
      b.classList.toggle("border-slate-200", !on);
      b.classList.toggle("text-slate-600", !on);
    });
  }
 
  function startSong() {
    if (!dbReady) { alert("인터넷 연결이 필요해요. 자유 연주에서는 노래 듣기를 사용하세요."); return; }
    stopSong(true);
    if (mode === "demo") {
      db.ref("rooms/" + roomCode + "/song").set({ active: true, name: selectedSong, mode: "demo", currentStep: 0 });
      runDemoStep(0);
    } else {
      ensembleActive = true; ensembleSong = selectedSong; ensembleStep = 0;
      db.ref("rooms/" + roomCode + "/song").set({ active: true, name: selectedSong, mode: "ensemble", currentStep: 0 });
    }
  }
  function runDemoStep(step) {
    var seq = SONGS[selectedSong].seq;
    if (step >= seq.length) { finishSong(); return; }
    db.ref("rooms/" + roomCode + "/song").update({ currentStep: step });
    playBell(NOTES[seq[step]].freq);
    demoTimer = setTimeout(function () { runDemoStep(step + 1); }, tempoMs);
  }
  function stopSong(silent) {
    if (demoTimer) { clearTimeout(demoTimer); demoTimer = null; }
    ensembleActive = false;
    if (dbReady && roomCode) db.ref("rooms/" + roomCode + "/song").set({ active: false });
  }
  function finishSong() {
    if (demoTimer) { clearTimeout(demoTimer); demoTimer = null; }
    ensembleActive = false;
    if (dbReady && roomCode) db.ref("rooms/" + roomCode + "/song").set({ active: false });
    celebrate();
  }
  function resetRoom() {
    if (!dbReady) return;
    if (!confirm("입장한 학생을 모두 내보낼까요?")) return;
    db.ref("rooms/" + roomCode + "/slots").remove();
  }
 
  function updateNowPlaying() {
    var box = $("t-now");
    if (role !== "teacher") return;
    if (!songState.active) { box.classList.add("hidden"); applyTurnHighlight(); return; }
    box.classList.remove("hidden");
    var seq = SONGS[songState.name].seq;
    var step = songState.currentStep || 0;
    var idx = seq[Math.min(step, seq.length - 1)];
    $("t-now-title").textContent = "🎼 " + SONGS[songState.name].title + (songState.mode === "ensemble" ? " · 합주" : " · 시범");
    $("t-now-note").textContent = NOTES[idx].name;
    $("t-now-progress").textContent = (step + 1) + " / " + seq.length;
    $("t-now-hint").textContent = songState.mode === "ensemble" ? "이 종을 든 학생이 울릴 차례예요" : "함께 따라 보아요";
    applyTurnHighlight();
  }
 
  /* ================= 학생 ================= */
  function checkRoom() {
    var code = ($("entry-code").value || "").trim();
    var name = ($("entry-name").value || "").trim();
    var err = $("entry-error");
    err.classList.add("hidden");
    if (code.length !== 4) { showErr("방 번호 네 자리를 적어 주세요."); return; }
    if (!name) { showErr("이름을 적어 주세요."); return; }
    if (!dbReady) { showErr("인터넷 연결이 필요해요."); return; }
 
    db.ref("rooms/" + code).get().then(function (snap) {
      if (!snap.exists()) { showErr("방을 찾을 수 없어요. 번호를 확인해 주세요."); return; }
      roomCode = code;
      var slots = (snap.val() && snap.val().slots) || {};
      renderNotePicker(slots);
      // 자리 변동 실시간 반영
      db.ref("rooms/" + code + "/slots").on("value", function (s) {
        if (mySlot === null) renderNotePicker(s.val() || {});
      });
    }).catch(function () { showErr("연결에 문제가 있어요. 다시 시도해 주세요."); });
  }
  function showErr(msg) { var e = $("entry-error"); e.textContent = msg; e.classList.remove("hidden"); }
 
  function renderNotePicker(slots) {
    show("entry-note-pick");
    var c = $("entry-bells"); c.innerHTML = "";
    for (var i = 0; i < 8; i++) {
      var taken = slots && slots[i];
      var bell = makeBell(i, { height: 80, who: taken ? slots[i].name : "" });
      if (taken) bell.classList.add("taken-off");
      else (function (idx) { bindTap(bell, function () { joinSlot(idx); }); })(i);
      c.appendChild(bell);
    }
    $("entry-confirm").classList.add("hidden");
  }
  function joinSlot(idx) {
    var name = ($("entry-name").value || "").trim();
    var slotRef = db.ref("rooms/" + roomCode + "/slots/" + idx);
    // 동시에 같은 자리를 고르는 경우 방지
    slotRef.transaction(function (cur) {
      if (cur) return; // 이미 누가 차지함 → 취소
      return { name: name, noteIdx: idx, deviceId: myDeviceId };
    }, function (err, committed) {
      if (err || !committed) { showErr("방금 다른 친구가 골랐어요. 다른 종을 골라 주세요."); return; }
      mySlot = idx;
      myJoinTime = Date.now();
      slotRef.onDisconnect().remove();
      role = "student";
      enterStudent(name);
    });
  }
  function enterStudent(name) {
    showScreen("student-screen");
    $("s-name").textContent = name;
    $("s-code").textContent = roomCode;
 
    var wrap = $("s-bell-wrap"); wrap.innerHTML = "";
    var bell = makeBell(mySlot, { height: 220, onTap: onStudentBell });
    bell.style.width = "100%";
    bell.querySelector(".emoji").style.fontSize = "3rem";
    bell.querySelector(".nm").style.fontSize = NOTES[mySlot].name.length > 1 ? "3rem" : "4.5rem";
    wrap.appendChild(bell);
 
    // 노래 상태 따라가기
    db.ref("rooms/" + roomCode + "/song").on("value", function (snap) {
      songState = snap.val() || { active: false };
      updateStudentView();
    });
    // 다른 종이 울릴 때 (참고용 표시는 본인 종만)
    db.ref("rooms/" + roomCode + "/ring").on("child_added", function (snap) {
      var v = snap.val(); if (!v || v.ts < myJoinTime) return;
      if (v.idx === mySlot && v.deviceId !== myDeviceId) popBell($("s-bell-wrap"), mySlot);
    });
  }
  function onStudentBell() {
    ringLocal(mySlot);
    broadcastRing(mySlot);
  }
  function updateStudentView() {
    var banner = $("s-banner");
    var prog = $("s-progress");
    if (!songState.active) {
      banner.textContent = "노래를 기다려요";
      banner.className = "rounded-2xl p-3 mb-3 text-center font-extrabold text-lg bg-slate-100 text-slate-400";
      prog.textContent = "";
      applyTurnHighlight();
      return;
    }
    var seq = SONGS[songState.name].seq;
    var step = songState.currentStep || 0;
    var activeIdx = seq[Math.min(step, seq.length - 1)];
    prog.textContent = SONGS[songState.name].title + " · " + (step + 1) + " / " + seq.length;
 
    if (activeIdx === mySlot) {
      banner.textContent = "🔔 지금 울려요!";
      banner.className = "rounded-2xl p-3 mb-3 text-center font-extrabold text-lg bg-emerald-500 text-white";
    } else {
      banner.textContent = "🙂 기다려요";
      banner.className = "rounded-2xl p-3 mb-3 text-center font-extrabold text-lg bg-sky-100 text-sky-500";
    }
    applyTurnHighlight();
  }
 
  /* ================= 자유 이용자 ================= */
  function setupFree() {
    var c = $("f-bells"); c.innerHTML = "";
    for (var i = 0; i < 8; i++) {
      c.appendChild(makeBell(i, { height: 96, onTap: function (idx) { ringLocal(idx); } }));
    }
    var s = $("f-songs"); s.innerHTML = "";
    SONG_KEYS.forEach(function (key) {
      var b = document.createElement("button");
      b.className = "py-3 rounded-xl font-extrabold border-2 border-emerald-200 text-emerald-600";
      b.textContent = "▶ " + SONGS[key].title;
      b.onclick = function () { playFreeSong(key); };
      s.appendChild(b);
    });
  }
  function playFreeSong(key) {
    stopFreeSong();
    show("f-stop");
    var seq = SONGS[key].seq, i = 0;
    (function step() {
      if (i >= seq.length) { stopFreeSong(); return; }
      var idx = seq[i++];
      playBell(NOTES[idx].freq);
      popBell($("f-bells"), idx);
      freeTimer = setTimeout(step, 600);
    })();
  }
  function stopFreeSong() {
    if (freeTimer) { clearTimeout(freeTimer); freeTimer = null; }
    hide("f-stop");
  }
 
  /* ================= 공통: 차례 강조 ================= */
  function applyTurnHighlight() {
    var activeIdx = null;
    if (songState.active) {
      var seq = SONGS[songState.name].seq;
      activeIdx = seq[Math.min(songState.currentStep || 0, seq.length - 1)];
    }
    ["t-bells", "s-bell-wrap"].forEach(function (cid) {
      var c = $(cid); if (!c) return;
      c.querySelectorAll(".bell").forEach(function (el) {
        var idx = parseInt(el.getAttribute("data-idx"), 10);
        el.classList.toggle("turn", activeIdx !== null && idx === activeIdx);
      });
    });
  }
 
  function celebrate() {
    playChord();
    show("celebrate");
    setTimeout(function () { hide("celebrate"); }, 2600);
  }
 
  /* ================= 나가기 ================= */
  function exit() {
    try {
      if (role === "teacher" && dbReady && roomCode) db.ref("rooms/" + roomCode).remove();
      if (role === "student" && dbReady && roomCode && mySlot !== null)
        db.ref("rooms/" + roomCode + "/slots/" + mySlot).remove();
    } catch (e) {}
    if (demoTimer) clearTimeout(demoTimer);
    if (freeTimer) clearTimeout(freeTimer);
    location.reload();
  }
 
  /* ---------- 전역 노출 ---------- */
  window.App = {
    enterTeacher: enterTeacher,
    showStudentForm: showStudentForm,
    backToSelection: backToSelection,
    enterFree: enterFree,
    checkRoom: checkRoom,
    setMode: setMode,
    setTempo: setTempo,
    startSong: startSong,
    stopSong: stopSong,
    resetRoom: resetRoom,
    stopFreeSong: stopFreeSong,
    exit: exit
  };
 
})();
</script>
</body>
</html>
